<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Figma</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #18A0FB;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            background-color: #0D8DE3;
        }
        button:disabled {
            background-color: #A0CFFD;
            cursor: not-allowed;
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .status.success { color: #1BC47D; }
        .status.error   { color: #F24E1E; }
        .viewport-label {
            font-size: 11px;
            font-weight: 600;
            color: #555;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .viewport-options {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 12px;
        }
        .viewport-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            padding: 5px 6px;
            border-radius: 4px;
            user-select: none;
        }
        .viewport-checkbox:hover {
            background: #f5f5f5;
        }
        .viewport-checkbox input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            border: 1.5px solid #D9D9D9;
            border-radius: 3px;
            background: #fff;
            cursor: pointer;
            position: relative;
        }
        .viewport-checkbox input[type="checkbox"]:checked {
            background: #18A0FB;
            border-color: #18A0FB;
        }
        .viewport-checkbox input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 8px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }
        .vp-desc {
            color: #999;
            font-size: 11px;
            margin-left: auto;
        }
    </style>
  <script type="module" crossorigin src="/popup.js"></script>
</head>
<body>
    <h2>HTML to Figma</h2>
    <p style="font-size: 12px; color: #555; margin-bottom: 16px;">
        Convert the current page into a JSON file compatible with our Figma plugin.
    </p>
    <p class="viewport-label">Viewport</p>
    <div class="viewport-options">
        <label class="viewport-checkbox">
            <input type="checkbox" class="viewport-cb" value="desktop" checked>
            Desktop <span class="vp-desc">현재 너비</span>
        </label>
        <label class="viewport-checkbox">
            <input type="checkbox" class="viewport-cb" value="375x812">
            iPhone SE <span class="vp-desc">375 × 812</span>
        </label>
        <label class="viewport-checkbox">
            <input type="checkbox" class="viewport-cb" value="390x844">
            iPhone 14 Pro <span class="vp-desc">390 × 844</span>
        </label>
        <label class="viewport-checkbox">
            <input type="checkbox" class="viewport-cb" value="412x915">
            Android <span class="vp-desc">412 × 915</span>
        </label>
    </div>
    <button id="captureBtn">Capture Page</button>
    <div id="status" class="status"></div>
    <div style="text-align: center; margin-top: 15px; font-size: 11px; color: #999;">v2.1.0</div>
</body>
</html>
